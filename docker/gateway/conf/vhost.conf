# =============================================================================
# NetworkMemories — MGO1 Gateway — Apache VHost
# Handles PS2 account management endpoints
# =============================================================================

<VirtualHost *:80>
    ServerName konami.konamionline.com
    ServerAlias *.konamionline.com
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Route account management POSTs to PHP handlers
    # PS2 sends to /us/mgs3/{reguser,deluser,chgpswd}/X.html
    <LocationMatch "^/us/mgs3/(reguser|deluser|chgpswd)/">
        RewriteEngine On
        # If the .html file doesn't exist, fall through to PHP handler
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteRule ^/us/mgs3/([a-z]+)/.*$ /us/mgs3/$1/handler.php [L,QSA]
    </LocationMatch>

    # Serve static policy/text files as-is
    <LocationMatch "^/us/mgs3/text/">
        Options -Indexes
    </LocationMatch>

    ErrorLog /var/log/apache2/mgops-error.log
    CustomLog /var/log/apache2/mgops-access.log combined
</VirtualHost>
